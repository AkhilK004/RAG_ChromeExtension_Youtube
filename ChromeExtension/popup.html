<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YouTube RAG</title>
    <style>
      :root{
        --bg1:#070a12;
        --bg2:#0b1020;
        --card: rgba(255,255,255,.06);
        --card2: rgba(255,255,255,.09);
        --border: rgba(255,255,255,.12);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.65);
        --danger:#ff5c7a;
        --ok:#42f5b0;
        --accent:#7c5cff;
        --accent2:#00d4ff;
        --shadow: 0 16px 50px rgba(0,0,0,.45);
        --radius: 16px;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        width: 380px;
        padding: 12px;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background:
          radial-gradient(900px 420px at 12% 0%, rgba(124,92,255,.35), transparent 60%),
          radial-gradient(900px 420px at 88% 0%, rgba(0,212,255,.25), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
      }

      .wrap{
        border:1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow:hidden;
      }

      .header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:12px 14px;
        border-bottom:1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      }

      .brand{
        display:flex;
        align-items:center;
        gap:10px;
      }
      .logo{
        width:34px;height:34px;border-radius:12px;
        background: linear-gradient(135deg,var(--accent),var(--accent2));
        display:grid;place-items:center;
        color:#07101a;font-weight:900;
        box-shadow: 0 10px 25px rgba(124,92,255,.22);
        flex:0 0 auto;
      }
      .title b{display:block;font-size:14px;line-height:1.1}
      .title small{display:block;font-size:11px;color:var(--muted);margin-top:2px}

      .pill{
        padding:6px 10px;
        border-radius:999px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color:var(--muted);
        font-size:11px;
        max-width: 160px;
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
      }

      .body{padding:12px 14px 14px}

      .chat{
        height: 220px;
        overflow:auto;
        border:1px solid var(--border);
        background: rgba(255,255,255,.05);
        border-radius: 14px;
        padding:10px;
      }
      .msg{
        margin:0 0 10px 0;
        font-size:13px;
        line-height:1.4;
        white-space:pre-wrap;
      }
      .bubble{
        padding:10px;
        border-radius:14px;
        border:1px solid transparent;
      }
      .user .bubble{
        background: rgba(124,92,255,.18);
        border-color: rgba(124,92,255,.30);
      }
      .ai .bubble{
        background: rgba(0,212,255,.12);
        border-color: rgba(0,212,255,.22);
      }

      .status{
        margin-top:10px;
        font-size:12px;
        color:var(--muted);
        display:flex;
        justify-content:space-between;
        gap:10px;
        align-items:center;
      }
      .status.ok{color:rgba(66,245,176,.9)}
      .status.err{color:var(--danger)}

      .controls{
        margin-top:10px;
        display:flex;
        gap:8px;
      }

      textarea{
        flex:1;
        min-height: 44px;
        max-height: 110px;
        resize: vertical;
        padding:10px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color: var(--text);
        outline:none;
        font-size:13px;
        line-height:1.35;
      }
      textarea:focus{
        border-color: rgba(124,92,255,.55);
        box-shadow: 0 0 0 3px rgba(124,92,255,.18);
      }

      .btn{
        border:0;
        cursor:pointer;
        border-radius: 14px;
        padding: 10px 12px;
        font-weight: 800;
        color:#07101a;
        background: linear-gradient(135deg,var(--accent),var(--accent2));
        min-width: 76px;
        transition: transform .06s ease;
      }
      .btn:active{transform: translateY(1px)}
      .btn:disabled{cursor:not-allowed; filter: grayscale(.25) brightness(.9)}

      .btn-ghost{
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color: var(--text);
        min-width: 44px;
        padding: 10px 0;
      }

      .row{
        display:flex; gap:8px; align-items:center;
      }
      .kbox{
        display:flex; gap:8px; align-items:center;
        padding:6px 10px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.05);
        border-radius: 999px;
        color: var(--muted);
        font-size: 11px;
      }
      input[type="number"]{
        width:58px;
        padding:6px 8px;
        border-radius: 10px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color: var(--text);
        outline:none;
      }

      .spinner{
        width:14px;height:14px;border-radius:999px;
        border:2px solid rgba(255,255,255,.25);
        border-top-color: rgba(255,255,255,.9);
        display:inline-block;
        animation: spin .9s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      .hint{
        margin-top:10px;
        color: var(--muted);
        font-size:11px;
        opacity:.9;
      }

      /* Sources */
      .sourcesBox{
        display:none;
        margin-top:10px;
        border:1px solid var(--border);
        background:rgba(255,255,255,.05);
        border-radius:14px;
        padding:10px;
      }
      .sourcesList{
        display:flex;
        flex-direction:column;
        gap:8px;
      }
      .sourceItem{
        border:1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.04);
        border-radius:12px;
        padding:10px;
        display:flex;
        flex-direction:column;
        gap:8px;
      }
      .sourceTop{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
      }
      .sourceLabel{
        font-size:12px;
        color: var(--muted);
      }
      .tsBtn{
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color: var(--text);
        border-radius: 999px;
        cursor:pointer;
        padding: 6px 10px;
        font-weight: 700;
        font-size: 12px;
      }
      .sourceText{
        font-size:12px;
        opacity: 0.92;
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="header">
        <div class="brand">
          <div class="logo">YR</div>
          <div class="title">
            <b>YouTube RAG</b>
            <small>Ask about the current video</small>
          </div>
        </div>
        <div class="pill" id="videoPill">Video: —</div>
      </div>

      <div class="body">
        <div class="chat" id="chat"></div>

        <div class="status" id="statusRow">
          <span id="status">Ready.</span>
          <div class="row">
            <div class="kbox">
              Top-k <input id="k" type="number" min="1" max="10" value="3" />
            </div>
            <button class="btn btn-ghost" id="copyBtn" title="Copy last answer">⧉</button>
            <button class="btn btn-ghost" id="clearBtn" title="Clear chat">✕</button>
          </div>
        </div>

        <div style="margin-top:10px; display:flex; gap:8px;">
          <button class="btn btn-ghost" id="toggleSourcesBtn" style="flex:1;">
            Show Sources
          </button>
        </div>

        <div class="sourcesBox" id="sourcesBox">
          <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">
            Click a timestamp to jump in the video.
          </div>
          <div class="sourcesList" id="sourcesList"></div>
        </div>

        <div class="controls">
          <textarea id="question" placeholder="Type a question… (Enter to send, Shift+Enter new line)"></textarea>
          <button class="btn" id="askBtn">Send</button>
        </div>

        <div class="hint">
          Backend must be running: <code>http://127.0.0.1:8000/docs</code>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
